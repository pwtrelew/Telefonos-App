<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teléfonos App</title>
    
    <!-- Íconos de la aplicación -->
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .table-container { max-height: 60vh; overflow-y: auto; }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Ocultar flecha del select en Modo Excel */
        select.excel-cell::-ms-expand { display: none; }
    </style>
</head>
<body class="bg-[#1e1e1e] text-[#ffffff] min-h-screen">

    <!-- Navbar -->
    <nav class="bg-[#121212] text-[#ffffff] shadow-md p-4 flex justify-between items-center sticky top-0 z-50 rounded-b-3xl">
        <div class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-phone text-[#f5c66d]"></i> Teléfonos App
        </div>
        <div class="flex items-center gap-3">
            <button id="install-btn" class="hidden bg-[#f5c66d] text-[#1e1e1e] px-3 py-1.5 rounded-lg font-bold text-xs sm:text-sm hover:bg-[#ffdf91] transition shadow-md">
                <i class="fa-solid fa-download"></i> <span class="hidden sm:inline">Instalar App</span>
            </button>
            <div id="nav-user-info" class="hidden flex items-center gap-4">
                <span id="nav-username" class="font-medium text-[#ffffff] truncate max-w-[120px] sm:max-w-xs"></span>
                <button onclick="logout()" class="text-[#b3b3b3] hover:text-[#ffffff] transition text-sm flex items-center gap-1">
                    <i class="fa-solid fa-right-from-bracket"></i> <span class="hidden sm:inline">Salir</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Contenedor Principal de la App -->
    <main id="app-container" class="p-4 max-w-7xl mx-auto fade-in">
        <div class="text-center py-10">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-[#f5c66d]"></i>
            <p class="mt-4 text-[#b3b3b3]">Cargando sistema...</p>
        </div>
    </main>

    <!-- BOTTOM SHEET MODAL (Menú deslizable) -->
    <div id="bottom-sheet-overlay" class="fixed inset-0 bg-black bg-opacity-70 z-[100] opacity-0 pointer-events-none transition-opacity duration-300" onclick="closeBottomSheet()"></div>
    <div id="bottom-sheet" class="fixed left-0 right-0 bottom-0 bg-[#1e1e1e] rounded-t-3xl z-[101] translate-y-full transition-transform duration-300 max-h-[85vh] flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="p-5 border-b border-[#2a2a2a] flex justify-between items-center sticky top-0 bg-[#1e1e1e] rounded-t-3xl z-10">
            <h3 id="bottom-sheet-title" class="font-extrabold text-[#ffffff] text-lg truncate pr-4">Seleccionar</h3>
            <button onclick="closeBottomSheet()" class="text-[#b3b3b3] hover:text-[#ffffff] bg-[#2a2a2a] rounded-full min-w-[32px] h-8 flex items-center justify-center transition">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div id="bottom-sheet-content" class="overflow-y-auto pb-6">
            <!-- El contenido se inyecta dinámicamente -->
        </div>
    </div>

    <!-- PWA Setup Dinámico -->
    <script>
        const manifest = {
            name: "Teléfonos App",
            short_name: "Teléfonos App",
            start_url: "./",
            display: "standalone",
            background_color: "#1e1e1e",
            theme_color: "#121212",
            icons: [
                {"src": "./icon.png", "sizes": "192x192", "type": "image/png", "purpose": "any maskable"},
                {"src": "./icon.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable"}
            ]
        };
        // Codificamos el manifiesto de forma más segura para móviles
        const manifestURL = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURL}">`);
        
        if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.protocol === 'http:')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }

        // Lógica para capturar y mostrar el botón de instalación manual
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            // Evita que Chrome muestre el mensaje emergente automático
            e.preventDefault();
            // Guarda el evento para dispararlo cuando el usuario haga clic
            deferredPrompt = e;
            // Muestra nuestro botón de instalar en la barra superior
            const installBtn = document.getElementById('install-btn');
            if(installBtn) {
                installBtn.classList.remove('hidden');
                installBtn.onclick = async () => {
                    // Muestra el prompt oficial de instalación
                    deferredPrompt.prompt();
                    // Espera a ver qué elige el usuario
                    const { outcome } = await deferredPrompt.userChoice;
                    if(outcome === 'accepted') {
                        installBtn.classList.add('hidden'); // Lo ocultamos si aceptó
                    }
                    deferredPrompt = null;
                };
            }
        });

        // Si la app se instala con éxito (por cualquier medio), ocultamos el botón
        window.addEventListener('appinstalled', () => {
            const installBtn = document.getElementById('install-btn');
            if(installBtn) installBtn.classList.add('hidden');
            deferredPrompt = null;
        });

        // Protector anti-congelamiento (Si la red falla y no carga en 10 segs)
        setTimeout(() => {
            const container = document.getElementById('app-container');
            if (container && container.innerHTML.includes('Cargando sistema...')) {
                container.innerHTML = `
                    <div class="text-center py-10 fade-in">
                        <i class="fa-solid fa-triangle-exclamation text-5xl text-red-400 mb-4"></i>
                        <h2 class="text-xl font-bold text-[#ffffff]">Problema de conexión</h2>
                        <p class="mt-2 text-[#b3b3b3] text-sm max-w-sm mx-auto">La base de datos está tardando demasiado en responder. Verifica tu conexión a internet.</p>
                        <button onclick="window.location.reload()" class="mt-6 bg-[#f5c66d] text-[#1e1e1e] font-extrabold py-3 px-8 rounded-xl hover:bg-[#ffdf91] transition">Recargar página</button>
                    </div>
                `;
            }
        }, 10000);
    </script>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let parsedConfig;
        try { parsedConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null; } catch (e) {}
        
        const firebaseConfig = parsedConfig || {
            apiKey: "AIzaSyC0Hzs2DrYYxqVsOgjs2m7GbFZqGRrrZnQ",
            authDomain: "telefonos-app.firebaseapp.com",
            projectId: "telefonos-app",
            storageBucket: "telefonos-app.firebasestorage.app",
            messagingSenderId: "817969882853",
            appId: "1:817969882853:web:ad7a27f25133be85c6160c"
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'territorios-app-123';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Estado Global
        let firebaseUser = null;
        let loggedInAppUser = null; 
        let allUsers = [];
        let allTerritories = [];
        let currentViewTerritoryId = null;
        let sortActiveFirst = false;

        let isUserAccordionOpen = false;
        let isPublishersAccordionOpen = false;
        let excelSel = { startR: -1, startC: -1, endR: -1, endC: -1, isDragging: false };
        let publisherSearchQuery = '';

        const OpcionesLlamada = [
            "-", 
            "No atendió nadie", 
            "No Abonado/ Inhabilitado", 
            "Cortó/ No le Interesa", 
            "Se dejó mensaje al contestador", 
            "Atendió, Ocupado", 
            "Empresa o Comercio", 
            "Revisita", 
            "NO volver a llamar"
        ];

        const getProgress = (territory, isNorteAssignee) => {
            let totalNumbers = 0;
            let completedNumbers = 0;
            let requiredActions = 0;
            let madeActions = 0;

            (territory.numbers || []).forEach(n => {
                totalNumbers++;
                requiredActions++; 
                let r1 = n.result && n.result !== "-";
                if (r1) madeActions++;

                if (!isNorteAssignee) {
                    requiredActions++; 
                    let r2 = n.result2 && n.result2 !== "-";
                    if (r2) madeActions++;
                    
                    if (r1 && r2) completedNumbers++;
                } else {
                    if (r1) completedNumbers++;
                }
            });
            
            return { totalNumbers, completedNumbers, requiredActions, madeActions };
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error Auth:", error);
            }
        };

        const container = document.getElementById('app-container');

        // Controlador maestro de renderizado seguro
        window.renderApp = () => {
            try {
                const navUserInfo = document.getElementById('nav-user-info');
                const navUsername = document.getElementById('nav-username');

                let numbersScrollPos = 0;
                const numbersScrollContainer = document.getElementById('numbers-scroll-container');
                if (numbersScrollContainer) numbersScrollPos = numbersScrollContainer.scrollTop;

                let adminScrollPos = 0;
                const adminScrollContainer = document.getElementById('admin-table-container');
                if (adminScrollContainer) adminScrollPos = adminScrollContainer.scrollTop;

                if (!loggedInAppUser) {
                    if (navUserInfo) navUserInfo.classList.add('hidden');
                    renderLogin();
                } else {
                    if (navUserInfo) navUserInfo.classList.remove('hidden');
                    if (navUsername) navUsername.innerHTML = `<i class="fa-solid ${loggedInAppUser.role === 'admin' ? 'fa-user-shield' : 'fa-user'} text-[#f5c66d]"></i> ${loggedInAppUser.username || 'Usuario'}`;
                    
                    if (loggedInAppUser.role === 'admin') {
                        renderAdminDashboard();
                        const newAdminScroll = document.getElementById('admin-table-container');
                        if (newAdminScroll) newAdminScroll.scrollTop = adminScrollPos;
                    } else {
                        if (currentViewTerritoryId) {
                            renderTerritoryView(currentViewTerritoryId);
                            const newNumbersScroll = document.getElementById('numbers-scroll-container');
                            if (newNumbersScroll) newNumbersScroll.scrollTop = numbersScrollPos;
                        } else {
                            renderUserDashboard();
                        }
                    }
                }
            } catch (error) {
                console.error("Error al renderizar:", error);
                container.innerHTML = `<div class="p-6 bg-red-900 text-white rounded-xl">Error en pantalla: ${error.message}</div>`;
            }
        };

        const renderLogin = () => {
            container.innerHTML = `
                <div class="max-w-md mx-auto bg-[#2a2a2a] p-10 rounded-3xl shadow-2xl mt-8 sm:mt-16 flex flex-col items-center border border-[#3a3a3a]">
                    
                    <img src="./icon.png" alt="Teléfonos App Logo" class="w-24 h-24 mb-6 rounded-2xl shadow-lg" id="app-logo" onerror="document.getElementById('app-logo').style.display='none'; document.getElementById('fallback-logo').classList.remove('hidden');">
                    <i id="fallback-logo" class="fa-solid fa-phone text-6xl text-[#f5c66d] mb-6 hidden"></i>
                    
                    <h2 class="text-3xl font-extrabold text-center mb-10 text-[#ffffff]">Teléfonos App</h2>
                    <form id="loginForm" class="space-y-6 w-full">
                        <div>
                            <input type="text" id="username" placeholder="Nombre de usuario" class="w-full px-5 py-3 border border-[#3a3a3a] rounded-xl bg-[#3a3a3a] text-[#ffffff] placeholder-[#b3b3b3] focus:outline-none focus:ring-2 focus:ring-[#f5c66d]" required autocomplete="off">
                        </div>
                        <div id="passwordFieldContainer" class="hidden fade-in">
                            <input type="password" id="password" placeholder="Contraseña secreta" class="w-full px-5 py-3 border border-[#3a3a3a] rounded-xl bg-[#3a3a3a] text-[#ffffff] placeholder-[#b3b3b3] focus:outline-none focus:ring-2 focus:ring-[#f5c66d]">
                        </div>
                        <button type="submit" class="w-full bg-[#f5c66d] text-[#1e1e1e] font-extrabold py-3 px-4 rounded-xl hover:bg-[#ffdf91] transition duration-200">
                            Ingresar
                        </button>
                    </form>
                    <p id="loginError" class="text-red-400 text-sm mt-5 text-center hidden"></p>
                </div>
            `;
            
            const userInput = document.getElementById('username');
            if (userInput) {
                userInput.addEventListener('input', (e) => {
                    const val = e.target.value.trim().toLowerCase();
                    const pwContainer = document.getElementById('passwordFieldContainer');
                    if (val === 'admin' || val === 'norte') {
                        pwContainer.classList.remove('hidden');
                    } else {
                        pwContainer.classList.add('hidden');
                    }
                });
            }

            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const u = document.getElementById('username').value.trim();
                    const p = document.getElementById('password').value.trim();
                    const uLower = u.toLowerCase();
                    
                    let user;
                    if (uLower === 'admin' || uLower === 'norte') {
                        user = allUsers.find(user => user?.username?.toLowerCase() === uLower && user.password === p);
                    } else {
                        user = allUsers.find(user => user?.username?.toLowerCase() === uLower);
                    }

                    if (user) {
                        loggedInAppUser = user;
                        currentViewTerritoryId = null;
                        try { localStorage.setItem('savedSessionId', user.id); } catch(err) {}
                        renderApp();
                    } else {
                        const err = document.getElementById('loginError');
                        if (uLower === 'admin' || uLower === 'norte') {
                            err.textContent = "Contraseña incorrecta.";
                        } else {
                            err.textContent = "Usuario no encontrado. Pide al administrador que te registre.";
                        }
                        err.classList.remove('hidden');
                    }
                });
            }
        };

        const renderAdminDashboard = () => {
            const totalT = allTerritories.length;
            const completedT = allTerritories.filter(t => t.status === 'Completado').length;
            
            const userHidden = isUserAccordionOpen ? '' : 'hidden';
            const userChevron = isUserAccordionOpen ? 'fa-chevron-up' : 'fa-chevron-down';

            const pubHidden = isPublishersAccordionOpen ? '' : 'hidden';
            const pubChevron = isPublishersAccordionOpen ? 'fa-chevron-up' : 'fa-chevron-down';

            const formatDate = (isoStr) => {
                if (!isoStr) return '-';
                const d = new Date(isoStr);
                return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' });
            };

            let tableRows = '';
            if (allTerritories.length === 0) {
                tableRows = '<tr><td colspan="3" class="p-6 text-center text-[#b3b3b3]">No hay territorios creados.</td></tr>';
            } else {
                let sortedTerritories = [...allTerritories].sort((a,b) => (a.name || "").localeCompare(b.name || ""));
                
                if (sortActiveFirst) {
                    sortedTerritories.sort((a, b) => {
                        const aActive = a.assignedTo ? 1 : 0;
                        const bActive = b.assignedTo ? 1 : 0;
                        if (aActive !== bActive) return bActive - aActive; 
                        return (a.name || "").localeCompare(b.name || ""); 
                    });
                }
                
                tableRows = sortedTerritories.map(t => {
                    const assignedUser = allUsers.find(u => u.id === t.assignedTo);
                    const isNorteAssignee = assignedUser && assignedUser?.username?.toLowerCase() === 'norte';
                    const prog = getProgress(t, isNorteAssignee);
                    
                    let progressHtml = '';
                    if (t.status === 'Completado' || (prog.madeActions === prog.requiredActions && prog.requiredActions > 0)) {
                        progressHtml = `<div class="text-[#cde7ac] font-bold text-sm"><i class="fa-solid fa-check-double"></i> ¡Finalizado!</div>`;
                    } else {
                        let percentage = prog.requiredActions === 0 ? 0 : (prog.madeActions / prog.requiredActions) * 100;
                        let text = `${prog.completedNumbers} de ${prog.totalNumbers} núm.`;
                        progressHtml = `
                            <div class="w-full bg-[#1e1e1e] rounded-full h-3 relative overflow-hidden">
                                <div class="bg-[#f5c66d] h-3 rounded-full transition-all duration-500" style="width: ${percentage}%"></div>
                            </div>
                            <div class="text-[11px] font-medium text-[#b3b3b3] mt-1.5">${text}</div>
                        `;
                    }
                    
                    const labelText = assignedUser ? assignedUser.username : '-';
                    const labelColor = assignedUser ? 'text-[#ffffff]' : 'text-[#b3b3b3]';

                    return `
                    <tr class="border-b border-[#2a2a2a] hover:bg-[#2a2a2a] transition-colors rounded-lg">
                        <td class="py-3 px-2 sm:px-4 font-medium text-[#ffffff] rounded-l-lg whitespace-nowrap w-[1%]">
                            <div class="flex items-center gap-2">
                                <span>${t.name}</span>
                                ${t.assignedTo ? `
                                <button onclick="unassignTerritory('${t.id}', '${t.name}')" class="text-red-400 hover:text-red-500 p-1" title="Quitar asignación (Recuperar)">
                                    <i class="fa-solid fa-user-xmark"></i>
                                </button>
                                ` : '<div class="w-6"></div>'}
                            </div>
                        </td>
                        <td class="py-3 px-2 sm:px-4 w-auto">${progressHtml}</td>
                        <td class="py-3 px-2 sm:px-4 rounded-r-lg w-[120px] sm:w-1/3">
                            <button onclick="openAssignSheet('${t.id}')" class="w-full border border-[#3a3a3a] rounded-lg py-1.5 px-3 bg-[#1e1e1e] text-left flex justify-between items-center focus:ring-1 focus:ring-[#f5c66d] outline-none text-xs sm:text-sm cursor-pointer shadow-sm hover:bg-[#2a2a2a] transition">
                                <span class="truncate pr-2 ${labelColor}">${labelText}</span>
                                <i class="fa-solid fa-chevron-down text-[#b3b3b3] text-[10px]"></i>
                            </button>
                        </td>
                    </tr>
                    `;
                }).join('');
            }

            const sortedPublishers = allUsers
                .filter(u => u.role !== 'admin' && u.username)
                .sort((a, b) => a.username.localeCompare(b.username));

            const publishersCardsHtml = sortedPublishers.map(u => {
                const userTerrs = allTerritories.filter(t => t.assignedTo === u.id);
                
                const sortedUserTerrs = [...userTerrs].sort((a, b) => {
                    const dateA = a.completedDate ? new Date(a.completedDate).getTime() : (a.assignedDate ? new Date(a.assignedDate).getTime() : 0);
                    const dateB = b.completedDate ? new Date(b.completedDate).getTime() : (b.assignedDate ? new Date(b.assignedDate).getTime() : 0);
                    return dateB - dateA;
                });

                const terrListHtml = sortedUserTerrs.map(t => {
                    let statusColor = "text-[#b3b3b3]";
                    if(t.status === 'Completado') statusColor = "text-[#cde7ac]";
                    if(t.status === 'En curso') statusColor = "text-[#f5c66d]";
                    
                    return `
                    <li class="flex flex-col border-b border-[#3a3a3a] py-2 last:border-0">
                        <div class="flex justify-between items-center mb-1">
                            <div class="flex items-center gap-2">
                                <span class="text-[#ffffff] font-bold text-xs">Terr. ${t.name}</span>
                                <span class="${statusColor} text-[10px] font-bold uppercase">${t.status}</span>
                            </div>
                            <button onclick="unassignTerritory('${t.id}', '${t.name}')" class="text-red-400 hover:text-red-500 p-1" title="Quitar asignación">
                                <i class="fa-solid fa-circle-minus"></i>
                            </button>
                        </div>
                        <div class="flex justify-between text-[10px] text-[#b3b3b3]">
                            <span>Asignado: ${formatDate(t.assignedDate)}</span>
                            <span>${t.completedDate ? `Terminado: ${formatDate(t.completedDate)}` : '-'}</span>
                        </div>
                    </li>`;
                }).join('');
                
                const securityText = u.password ? `<p class="text-[10px] text-[#b3b3b3] font-mono"><i class="fa-solid fa-lock text-[#cde7ac] mr-1"></i> Protegido con contraseña</p>` : `<p class="text-[10px] text-[#b3b3b3] font-mono"><i class="fa-solid fa-bolt text-[#f5c66d] mr-1"></i> Acceso directo</p>`;
                
                const displayStyle = publisherSearchQuery && !u.username.toLowerCase().includes(publisherSearchQuery.toLowerCase()) ? 'display: none;' : '';

                return `
                <div class="publisher-card bg-[#1e1e1e] p-5 rounded-2xl border border-[#3a3a3a]" data-name="${u.username.toLowerCase()}" style="${displayStyle}">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="bg-[#2a2a2a] p-2.5 rounded-full"><i class="fa-solid fa-user text-[#add8e6]"></i></div>
                        <div class="truncate">
                            <h4 class="font-bold text-[#ffffff] truncate">${u.username}</h4>
                            ${securityText}
                        </div>
                    </div>
                    <div class="bg-[#2a2a2a] rounded-xl p-3">
                        <h5 class="text-[10px] font-bold text-[#b3b3b3] mb-2 uppercase tracking-wider">Historial de Territorios</h5>
                        <ul class="space-y-1">
                            ${terrListHtml || '<li class="text-xs text-[#b3b3b3]">Ninguno</li>'}
                        </ul>
                    </div>
                </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="space-y-8">
                    <div class="bg-[#121212] p-4 sm:p-8 rounded-3xl shadow-xl border border-[#2a2a2a]">
                        <h3 class="text-2xl font-extrabold mb-6 border-b border-[#2a2a2a] pb-4 text-[#ffffff]"><i class="fa-solid fa-map text-[#f5c66d]"></i> Territorios</h3>
                        <div id="admin-table-container" class="table-container overflow-x-auto pr-2">
                            <table class="min-w-full text-left text-sm">
                                <thead class="bg-[#2a2a2a] sticky top-0 z-10 shadow-sm">
                                <tr>
                                    <th class="py-3 px-2 sm:px-4 w-[1%] whitespace-nowrap text-[#b3b3b3] rounded-l-lg">Terr.</th>
                                    <th class="py-3 px-2 sm:px-4 w-auto text-[#b3b3b3]">
                                        <div class="flex items-center justify-between pr-2">
                                            <span>Estado</span>

        const renderUserDashboard = () => {

            const statsByMonth = {};

        const renderTerritoryView = (tId) => {

            if (!territory) { currentViewTerritoryId = null; renderApp(); return; }

            const isNorte = loggedInAppUser && loggedInAppUser?.username?.toLowerCase() === 'norte';
            
            let theadHtml = '';
            let rowsHtml = '';

            if (isNorte) {

                tableClass += ' border-collapse border border-[#3a3a3a]';
                
                theadHtml = `
                <tr class="bg-[#2a2a2a]">

                    <th class="border border-[#4a4a4a] py-1 px-1 text-[#b3b3b3] font-semibold text-center w-[90px] min-w-[90px] max-w-[90px] overflow-hidden">Asignado a</th>

                    return `

                        </td>
                        <td class="excel-td border border-[#4a4a4a] p-0 relative transition-colors" data-row="${idx}" data-col="2" onmousedown="startExcelDrag(${idx}, 2)" onmouseenter="enterExcelDrag(${idx}, 2)">
                            <input type="date" id="date-${territory.id}-${idx}" data-row="${idx}" data-col="2" value="${num.date || ''}" onchange="updateNumberField('${territory.id}', ${idx}, 'date', this.value)" onpaste="handleExcelPaste(event, ${idx}, 2)" class="excel-cell w-full h-full min-h-[30px] bg-transparent px-1 py-0 outline-none focus:bg-[#3a3a3a] text-[#ffffff] text-xs cursor-cell transition-colors">
                        </td>
                        <td class="excel-td border border-[#4a4a4a] p-0 relative transition-colors" data-row="${idx}" data-col="3" onmousedown="startExcelDrag(${idx}, 3)" onmouseenter="enterExcelDrag(${idx}, 3)">
                            <select data-row="${idx}" data-col="3" onchange="updateResult('${territory.id}', ${idx}, 'result', this.value)" onpaste="handleExcelPaste(event, ${idx}, 3)" class="excel-cell w-full h-full min-h-[30px] bg-transparent px-1 py-0 outline-none focus:bg-[#3a3a3a] text-[#ffffff] text-[11px] cursor-cell appearance-none transition-colors">
                                ${optHtml1}
                            </select>
                        </td>
                    </tr>
                    `;
                }).join('');

            } else {
                // --- MODO PUBLICADOR NORMAL ---
                theadHtml = `
                <tr>
                    <th class="py-2 px-3 w-[40%] text-[#b3b3b3] rounded-l-lg">Teléfono</th>
                    <th class="py-2 px-1 sm:px-3 w-[30%] text-[#b3b3b3]">1ra Vuelta</th>
                    <th class="py-2 px-1 sm:px-3 w-[30%] text-[#b3b3b3] rounded-r-lg">2da Vuelta</th>
                </tr>`;

                rowsHtml = (territory.numbers || []).map((num, idx) => {
                    const labelText1 = num.result || '-';
                    const labelColor1 = labelText1 === '-' ? 'text-[#b3b3b3]' : 'text-[#ffffff]';
                    const labelText2 = num.result2 || '-';
                    const labelColor2 = labelText2 === '-' ? 'text-[#b3b3b3]' : 'text-[#ffffff]';
                    const isCalled = num.result && num.result !== "-";

                    return `
                    <tr class="hover:bg-[#2a2a2a] transition-colors ${isCalled ? 'bg-[#1e1e1e] opacity-70' : ''} rounded-lg">
                        <td class="py-2 px-3 font-bold text-base text-[#ffffff] rounded-l-lg tracking-wider whitespace-nowrap">
                            <div class="flex items-center gap-2">
                                <span>${num.phone}</span>
                                <button onclick="copyPhone('${num.phone}', this)" class="text-[#b3b3b3] hover:text-[#ffffff] p-1 rounded ml-1" title="Copiar número">
                                    <i class="fa-regular fa-copy"></i>
                                </button>
                            </div>
                        </td>
                        <td class="py-2 px-1 sm:px-3">
                            <button onclick="openResultSheet('${territory.id}', ${idx}, 'result', '1ra Vuelta')" class="w-full min-w-[100px] border border-[#3a3a3a] rounded-lg py-2 px-2 bg-[#2a2a2a] text-left flex justify-between items-center focus:ring-1 focus:ring-[#f5c66d] outline-none text-[11px] sm:text-xs cursor-pointer shadow-sm hover:bg-[#3a3a3a] transition">
                                <span class="truncate pr-1 ${labelColor1}">${labelText1}</span>
                                <i class="fa-solid fa-chevron-down text-[#b3b3b3] text-[10px]"></i>
                            </button>
                        </td>
                        <td class="py-2 px-1 sm:px-3 rounded-r-lg">
                            <button onclick="openResultSheet('${territory.id}', ${idx}, 'result2', '2da Vuelta')" class="w-full min-w-[100px] border border-[#3a3a3a] rounded-lg py-2 px-2 bg-[#2a2a2a] text-left flex justify-between items-center focus:ring-1 focus:ring-[#f5c66d] outline-none text-[11px] sm:text-xs cursor-pointer shadow-sm hover:bg-[#3a3a3a] transition">
                                <span class="truncate pr-1 ${labelColor2}">${labelText2}</span>
                                <i class="fa-solid fa-chevron-down text-[#b3b3b3] text-[10px]"></i>
                            </button>
                        </td>
                    </tr>
                    `;
                }).join('');
            }

            let displayStatus = (territory.status === 'Ronda 1' || territory.status === 'Ronda 2') ? 'En curso' : territory.status;

            container.innerHTML = `
                <div class="bg-[#121212] rounded-3xl shadow-xl overflow-hidden flex flex-col h-[85vh] border border-[#2a2a2a]">
                    <div class="bg-[#1e1e1e] p-6 border-b border-[#2a2a2a] flex justify-between items-center">
                        <div>
                            <button onclick="closeTerritory()" class="text-[#f5c66d] hover:text-[#ffdf91] mr-4 text-sm font-bold">
                                <i class="fa-solid fa-arrow-left"></i> Volver
                            </button>
                            <span class="font-extrabold text-2xl md:text-3xl text-[#ffffff]">${territory.name}</span>
                        </div>
                        <span class="bg-[#2a2a2a] text-[#ffffff] px-4 py-1.5 rounded-full text-xs font-bold border border-[#3a3a3a]">
                            ${displayStatus}
                        </span>
                    </div>

                    <div id="numbers-scroll-container" class="flex-1 overflow-y-auto ${isNorte ? 'p-0' : 'p-2'}">
                        <table class="${tableClass}">
                            <thead class="bg-[#1e1e1e] sticky top-0 shadow-lg z-10">
                                ${theadHtml}
                            </thead>
                            <tbody class="divide-y divide-[#2a2a2a]">
                                ${rowsHtml}
                            </tbody>
                        </table>
                    </div>
                    
                    ${displayStatus === 'Completado' ? `
                        <div class="bg-[#cde7ac] p-4 md:p-6 text-center text-[#1e1e1e] font-extrabold border-t border-[#cde7ac] flex items-center justify-center gap-3">
                            <i class="fa-solid fa-check-double text-xl md:text-2xl"></i> ¡Territorio completado en su totalidad!
                        </div>
                    ` : ''}
                </div>
            `;
        };

        // ---- LÓGICA DE SELECCIÓN MÚLTIPLE EXCEL (NORTE) ----
        window.startExcelDrag = (r, c) => {
            excelSel.isDragging = true;
            excelSel.startR = r;
            excelSel.startC = c;
            excelSel.endR = r;
            excelSel.endC = c;
            updateExcelSelectionUI();
        };

        window.enterExcelDrag = (r, c) => {
            if (excelSel.isDragging) {
                excelSel.endR = r;
                excelSel.endC = c;
                updateExcelSelectionUI();
            }
        };

        window.updateExcelSelectionUI = () => {
            const minR = Math.min(excelSel.startR, excelSel.endR);
            const maxR = Math.max(excelSel.startR, excelSel.endR);
            const minC = Math.min(excelSel.startC, excelSel.endC);
            const maxC = Math.max(excelSel.startC, excelSel.endC);

            document.querySelectorAll('.excel-td').forEach(td => {
                const r = parseInt(td.dataset.row);
                const c = parseInt(td.dataset.col);
                if (r >= minR && r <= maxR && c >= minC && c <= maxC) {
                    td.classList.add('bg-[#1a4066]', 'excel-selected'); 
                } else {
                    td.classList.remove('bg-[#1a4066]', 'excel-selected');
                }
            });
        };

        document.addEventListener('mouseup', () => {
            if (excelSel.isDragging) excelSel.isDragging = false;
        });

        document.addEventListener('keydown', (e) => {
            const isNorte = loggedInAppUser?.username?.toLowerCase() === 'norte';
            if (!isNorte || !currentViewTerritoryId) return;

            if (e.ctrlKey && e.key === 'c') {
                const minR = Math.min(excelSel.startR, excelSel.endR);
                const maxR = Math.max(excelSel.startR, excelSel.endR);
                const minC = Math.min(excelSel.startC, excelSel.endC);
                const maxC = Math.max(excelSel.startC, excelSel.endC);

                if (minR === -1) return;

                let tsv = '';
                for (let r = minR; r <= maxR; r++) {
                    let rowData = [];
                    for (let c = minC; c <= maxC; c++) {
                        const el = document.querySelector(`.excel-cell[data-row="${r}"][data-col="${c}"]`);
                        rowData.push(el ? el.value : '');
                    }
                    tsv += rowData.join('\t') + (r === maxR ? '' : '\n');
                }
                
                if (tsv !== '') {
                    navigator.clipboard.writeText(tsv).then(() => {
                        document.querySelectorAll('.excel-selected').forEach(td => {
                            td.classList.add('opacity-50');
                            setTimeout(() => td.classList.remove('opacity-50'), 150);
                        });
                    });
                }
            }
        });

        window.handleExcelPaste = async (e, startRow, startCol) => {
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            if (pasteData && (pasteData.includes('\t') || pasteData.includes('\n'))) {
                e.preventDefault(); 
                
                const territory = allTerritories.find(t => t.id === currentViewTerritoryId);
                if (!territory || !territory.numbers) return;

                const rows = pasteData.split(/\r?\n/);
                if (rows[rows.length - 1] === "") rows.pop(); 

                const now = new Date();
                const localToday = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                let updated = false;

                for (let i = 0; i < rows.length; i++) {
                    const cols = rows[i].split('\t');
                    const targetR = startRow + i;
                    if (targetR >= territory.numbers.length) break;

                    for (let j = 0; j < cols.length; j++) {
                        const targetC = startCol + j;
                        const val = cols[j].trim();

                        if (targetC === 1) { 
                            territory.numbers[targetR].customAssignee = val;
                            if (val !== '' && !territory.numbers[targetR].date) territory.numbers[targetR].date = localToday;
                            updated = true;
                        } else if (targetC === 2) { 
                            territory.numbers[targetR].date = val;
                            updated = true;
                        } else if (targetC === 3) { 
                            const matchedOpt = OpcionesLlamada.find(o => o.toLowerCase() === val.toLowerCase());
                            territory.numbers[targetR].result = matchedOpt ? matchedOpt : val;
                            updated = true;
                        }
                    }
                }

                if (updated) {
                    try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'territories', currentViewTerritoryId), { numbers: territory.numbers }); } 
                    catch (err) { console.error(err); }
                }
            }
        };

        window.handleAssigneeChange = async (tId, numIndex, value) => {
            const territory = allTerritories.find(t => t.id === tId);
            if (!territory || !territory.numbers) return;
            
            territory.numbers[numIndex].customAssignee = value;
            
            if (value.trim() !== '' && !territory.numbers[numIndex].date) {
                const now = new Date();
                const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                territory.numbers[numIndex].date = today;
                const dateInput = document.getElementById(`date-${tId}-${numIndex}`);
                if(dateInput) dateInput.value = today;
            }
            
            try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'territories', tId), { numbers: territory.numbers }); } 
            catch (err) { console.error(err); }
        };

        // ---- LÓGICA DEL BOTTOM SHEET ----
        window.closeBottomSheet = () => {
            const overlay = document.getElementById('bottom-sheet-overlay');
            const sheet = document.getElementById('bottom-sheet');
            if(overlay) {
                overlay.classList.remove('opacity-100', 'pointer-events-auto');
                overlay.classList.add('opacity-0', 'pointer-events-none');
            }
            if(sheet) {
                sheet.classList.remove('translate-y-0');
                sheet.classList.add('translate-y-full');
            }
        };

        const showBottomSheet = () => {
            const overlay = document.getElementById('bottom-sheet-overlay');
            const sheet = document.getElementById('bottom-sheet');
            if(overlay) {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                overlay.classList.add('opacity-100', 'pointer-events-auto');
            }
            if(sheet) {
                sheet.classList.remove('translate-y-full');
                sheet.classList.add('translate-y-0');
            }
        };

        window.openAssignSheet = (tId) => {
            const territory = allTerritories.find(t => t.id === tId);
            document.getElementById('bottom-sheet-title').innerText = `Asignar Territorio ${territory.name}`;
            
            let content = `
                <button onclick="closeAndAssign('${tId}', '')" class="w-full text-left p-4 border-b border-[#2a2a2a] text-[#b3b3b3] hover:bg-[#2a2a2a] transition flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-[#3a3a3a] flex items-center justify-center"><i class="fa-solid fa-user-xmark"></i></div>
                    - (Dejar libre)
                </button>`;
            
            allUsers.filter(u => u.role !== 'admin' && u.username).forEach(u => {
                const isSelected = territory.assignedTo === u.id;
                const textColor = isSelected ? 'text-[#f5c66d]' : 'text-[#ffffff]';
                const bgClass = isSelected ? 'bg-[#2a2a2a]' : 'hover:bg-[#2a2a2a]';
                
                content += `
                <button onclick="closeAndAssign('${tId}', '${u.id}')" class="w-full text-left p-4 border-b border-[#2a2a2a] ${bgClass} transition flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-[#3a3a3a] flex items-center justify-center text-[#add8e6]"><i class="fa-solid fa-user"></i></div>
                        <span class="${textColor} font-bold">${u.username}</span>
                    </div>
                    ${isSelected ? '<i class="fa-solid fa-check text-[#f5c66d] text-lg"></i>' : ''}
                </button>`;
            });
            
            document.getElementById('bottom-sheet-content').innerHTML = content;
            showBottomSheet();
        };

        window.closeAndAssign = (tId, userId) => {
            closeBottomSheet();
            assignTerritory(tId, userId);
        };

        window.openResultSheet = (tId, numIndex, field, titleLabel) => {
            const territory = allTerritories.find(t => t.id === tId);
            const currentVal = territory.numbers[numIndex][field] || '-';
            
            document.getElementById('bottom-sheet-title').innerText = `Seleccionar ${titleLabel}`;
            
            let content = '';
            OpcionesLlamada.forEach(opt => {
                const isSelected = currentVal === opt;
                const isDash = opt === '-';
                const textColor = isSelected ? 'text-[#f5c66d]' : (isDash ? 'text-[#b3b3b3]' : 'text-[#ffffff]');
                const bgClass = isSelected ? 'bg-[#2a2a2a]' : 'hover:bg-[#2a2a2a]';
                
                content += `
                <button onclick="closeAndUpdateResult('${tId}', ${numIndex}, '${field}', '${opt}')" class="w-full text-left p-4 border-b border-[#2a2a2a] ${bgClass} transition flex justify-between items-center text-sm md:text-base">
                    <span class="${textColor} ${isSelected ? 'font-bold' : ''}">${opt}</span>
                    ${isSelected ? '<i class="fa-solid fa-check text-[#f5c66d] text-lg"></i>' : ''}
                </button>`;
            });
            
            document.getElementById('bottom-sheet-content').innerHTML = content;
            showBottomSheet();
        };

        window.closeAndUpdateResult = (tId, numIndex, field, newResult) => {
            closeBottomSheet();
            updateResult(tId, numIndex, field, newResult);
        };

        // ---- ACCIONES SECUNDARIAS ----
        window.toggleSortActive = () => { sortActiveFirst = !sortActiveFirst; renderApp(); };

        window.filterPublishers = (query) => {
            publisherSearchQuery = query;
            const lowerQuery = query.toLowerCase();
            document.querySelectorAll('.publisher-card').forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = name.includes(lowerQuery) ? '' : 'none';
            });
        };

        window.toggleUserAccordion = () => {
            isUserAccordionOpen = !isUserAccordionOpen;
            const content = document.getElementById('user-form-container');
            const chevron = document.getElementById('user-chevron');
            if (isUserAccordionOpen) {
                content.classList.remove('hidden');
                chevron.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                content.classList.add('hidden');
                chevron.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        };

        window.togglePublishersAccordion = () => {
            isPublishersAccordionOpen = !isPublishersAccordionOpen;
            const content = document.getElementById('publishers-container');
            const chevron = document.getElementById('publishers-chevron');
            if (isPublishersAccordionOpen) {
                content.classList.remove('hidden');
                chevron.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                content.classList.add('hidden');
                chevron.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        };

        window.copyPhone = (phone, btnElement) => {
            const el = document.createElement('textarea');
            el.value = phone;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            if (btnElement) {
                const icon = btnElement.querySelector('i');
                icon.className = 'fa-solid fa-check text-[#cde7ac]';
                setTimeout(() => { icon.className = 'fa-regular fa-copy'; }, 1500);
            }
        };

        window.logout = () => { 
            loggedInAppUser = null; 
            currentViewTerritoryId = null; 
            try { localStorage.removeItem('savedSessionId'); } catch(e){}
            renderApp(); 
        };
        window.openTerritory = (id) => { currentViewTerritoryId = id; renderApp(); };
        window.closeTerritory = () => { currentViewTerritoryId = null; renderApp(); };

        window.unassignTerritory = (tId, tName) => {
            if(confirm(`¿Seguro que deseas quitarle el Territorio ${tName} al publicador asignado? Volverá a estar libre, pendiente y su progreso regresará a cero.`)) {
                assignTerritory(tId, "");
            }
        };

        window.assignTerritory = async (tId, userId) => {
            try {
                const tRef = doc(db, 'artifacts', appId, 'public', 'data', 'territories', tId);
                const territory = allTerritories.find(t => t.id === tId);
                let newStatus = territory.status;
                let updateData = { assignedTo: userId || null };
                
                if (userId && newStatus === 'Pendiente') newStatus = 'En curso';
                
                if (!userId) { 
                    newStatus = 'Pendiente'; 
                    updateData.assignedDate = null; 
                    updateData.completedDate = null; 
                    updateData.numbers = (territory.numbers || []).map(n => ({
                        ...n,
                        result: "-",
                        result2: "-",
                        checked1: false,
                        checked2: false
                    }));
                }
                
                if (userId && territory.assignedTo !== userId) { 
                    updateData.assignedDate = new Date().toISOString(); 
                    updateData.completedDate = null; 
                }

                updateData.status = newStatus;
                await updateDoc(tRef, updateData);
            } catch (err) { console.error("Error asignando:", err); }
        };

        window.updateResult = async (tId, numIndex, field, newResult) => {
            const territory = allTerritories.find(t => t.id === tId);
            if (!territory || !territory.numbers) return;
            
            territory.numbers[numIndex][field] = newResult;

            const assignedUser = allUsers.find(u => u.id === territory.assignedTo);
            const isNorteAssignee = assignedUser && assignedUser?.username?.toLowerCase() === 'norte';

            const prog = getProgress(territory, isNorteAssignee);
            const isComplete = (prog.madeActions === prog.requiredActions && prog.requiredActions > 0);

            let newStatus = territory.assignedTo ? 'En curso' : 'Pendiente';
            let completedDate = territory.completedDate || null;

            if (isComplete) {
                newStatus = 'Completado';
                if (territory.status !== 'Completado') completedDate = new Date().toISOString();
            } else {
                if (territory.status === 'Completado') completedDate = null;
            }

            try { 
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'territories', tId), { 
                    numbers: territory.numbers,
                    status: newStatus,
                    completedDate: completedDate
                }); 
            } 
            catch (err) { console.error(err); }
        };

        window.updateNumberField = async (tId, numIndex, field, value) => {
            const territory = allTerritories.find(t => t.id === tId);
            if (!territory || !territory.numbers) return;
            territory.numbers[numIndex][field] = value;
            try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'territories', tId), { numbers: territory.numbers }); } 
            catch (err) { console.error(err); }
        };

        // ---- INICIALIZACIÓN Y SUSCRIPCIONES A FIREBASE ----
        const initDataListeners = () => {
            const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
            onSnapshot(usersRef, (snapshot) => {
                const users = [];
                snapshot.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
                
                if (users.length === 0) { 
                    addDoc(usersRef, { username: 'admin', password: 'admin', role: 'admin' }); 
                } else if (!users.find(u => u?.username?.toLowerCase() === 'norte')) {
                    addDoc(usersRef, { username: 'Norte', password: 'norte', role: 'user' });
                }
                
                allUsers = users;
                
                if (!loggedInAppUser) {
                    try { 
                        const savedId = localStorage.getItem('savedSessionId'); 
                        if (savedId) {
                            const found = allUsers.find(u => u.id === savedId);
                            if (found) loggedInAppUser = found;
                        }
                    } catch(e) {}
                } else {
                    const updatedMe = allUsers.find(u => u.id === loggedInAppUser.id);
                    loggedInAppUser = updatedMe || null;
                }
                
                renderApp();
            }, (error) => console.error("Error cargando usuarios:", error));

            const terrRef = collection(db, 'artifacts', appId, 'public', 'data', 'territories');
            onSnapshot(terrRef, (snapshot) => {
                const terrs = [];
                snapshot.forEach(doc => terrs.push({ id: doc.id, ...doc.data() }));
                allTerritories = terrs;
                
                renderApp();
            }, (error) => console.error("Error cargando territorios:", error));
        };

        onAuthStateChanged(auth, (user) => {
            firebaseUser = user;
            if (user) { 
                if (!window.dataListenersInitialized) {
                    window.dataListenersInitialized = true;
                    initDataListeners(); 
                }
                renderApp(); // ¡Dibuja la pantalla de login de inmediato sin esperar a la BD!
            }
        });

        initAuth();

    </script>
</body>
</html>
