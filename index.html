<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teléfonos App</title>
    
    <!-- Íconos de la aplicación -->
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .table-container { max-height: 60vh; overflow-y: auto; }
        
        /* Scrollbar styling for dark mode */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-[#1e1e1e] text-[#ffffff] min-h-screen">

    <!-- Navbar -->
    <nav class="bg-[#121212] text-[#ffffff] shadow-md p-4 flex justify-between items-center sticky top-0 z-50 rounded-b-3xl">
        <div class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-phone text-[#f5c66d]"></i> Teléfonos App
        </div>
        <div id="nav-user-info" class="hidden flex items-center gap-4">
            <span id="nav-username" class="font-medium text-[#ffffff]"></span>
            <button onclick="logout()" class="text-[#b3b3b3] hover:text-[#ffffff] transition text-sm">
                <i class="fa-solid fa-right-from-bracket"></i> Salir
            </button>
        </div>
    </nav>

    <!-- Contenedor Principal de la App -->
    <main id="app-container" class="p-4 max-w-7xl mx-auto fade-in">
        <div class="text-center py-10">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-[#f5c66d]"></i>
            <p class="mt-4 text-[#b3b3b3]">Cargando sistema...</p>
        </div>
    </main>

    <!-- BOTTOM SHEET MODAL (Menú deslizable desde abajo) -->
    <div id="bottom-sheet-overlay" class="fixed inset-0 bg-black bg-opacity-70 z-[100] opacity-0 pointer-events-none transition-opacity duration-300" onclick="closeBottomSheet()"></div>
    <div id="bottom-sheet" class="fixed left-0 right-0 bottom-0 bg-[#1e1e1e] rounded-t-3xl z-[101] translate-y-full transition-transform duration-300 max-h-[85vh] flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="p-5 border-b border-[#2a2a2a] flex justify-between items-center sticky top-0 bg-[#1e1e1e] rounded-t-3xl z-10">
            <h3 id="bottom-sheet-title" class="font-extrabold text-[#ffffff] text-lg">Seleccionar</h3>
            <button onclick="closeBottomSheet()" class="text-[#b3b3b3] hover:text-[#ffffff] bg-[#2a2a2a] rounded-full w-8 h-8 flex items-center justify-center transition">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div id="bottom-sheet-content" class="overflow-y-auto pb-6">
            <!-- El contenido se inyecta dinámicamente -->
        </div>
    </div>

    <!-- PWA Setup Dinámico -->
    <script>
        const manifest = {
            name: "Teléfonos App",
            short_name: "Teléfonos App",
            start_url: ".",
            display: "standalone",
            background_color: "#1e1e1e",
            theme_color: "#121212",
            icons: [{"src": "./icon.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable"}]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURL}">`);
        
        if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.protocol === 'http:')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            });
        }
    </script>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración de tu proyecto en Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyC0Hzs2DrYYxqVsOgjs2m7GbFZqGRrrZnQ",
            authDomain: "telefonos-app.firebaseapp.com",
            projectId: "telefonos-app",
            storageBucket: "telefonos-app.firebasestorage.app",
            messagingSenderId: "817969882853",
            appId: "1:817969882853:web:ad7a27f25133be85c6160c"
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'territorios-app-123';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Estado Global
        let firebaseUser = null;
        let loggedInAppUser = null; 
        let allUsers = [];
        let allTerritories = [];
        let currentViewTerritoryId = null;
        let sortActiveFirst = false;

        // Estado de los acordeones del administrador
        let isUserAccordionOpen = false;
        let isPublishersAccordionOpen = false;

        const OpcionesLlamada = [
            "-", 
            "No atendió nadie", 
            "No Abonado/ Inhabilitado", 
            "Cortó/ No le Interesa", 
            "Se dejó mensaje al contestador", 
            "Atendió, Ocupado", 
            "Empresa o Comercio", 
            "Revisita", 
            "NO volver a llamar"
        ];

        const getProgress = (territory, isNorteAssignee) => {
            let totalRequired = 0;
            let totalMade = 0;

            (territory.numbers || []).forEach(n => {
                totalRequired++; 
                if (n.result && n.result !== "-") totalMade++;

                if (!isNorteAssignee) {
                    totalRequired++; 
                    if (n.result2 && n.result2 !== "-") {
                        totalMade++;
                    }
                }
            });
            
            return { required: totalRequired, made: totalMade };
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error de autenticación:", error);
                document.getElementById('app-container').innerHTML = `<p class="text-red-500 text-center font-bold">Error de conexión con la base de datos. Intente recargar la página.</p>`;
            }
        };

        const container = document.getElementById('app-container');

        window.renderApp = () => {
            try {
                const navUserInfo = document.getElementById('nav-user-info');
                const navUsername = document.getElementById('nav-username');

                let numbersScrollPos = 0;
                const numbersScrollContainer = document.getElementById('numbers-scroll-container');
                if (numbersScrollContainer) numbersScrollPos = numbersScrollContainer.scrollTop;

                let adminScrollPos = 0;
                const adminScrollContainer = document.getElementById('admin-table-container');
                if (adminScrollContainer) adminScrollPos = adminScrollContainer.scrollTop;

                if (!loggedInAppUser) {
                    if (navUserInfo) navUserInfo.classList.add('hidden');
                    renderLogin();
                } else {
                    if (navUserInfo) navUserInfo.classList.remove('hidden');
                    if (navUsername) navUsername.innerHTML = `<i class="fa-solid ${loggedInAppUser.role === 'admin' ? 'fa-user-shield' : 'fa-user'} text-[#f5c66d]"></i> ${loggedInAppUser.username || 'Usuario'}`;
                    
                    if (loggedInAppUser.role === 'admin') {
                        renderAdminDashboard();
                        const newAdminScroll = document.getElementById('admin-table-container');
                        if (newAdminScroll) newAdminScroll.scrollTop = adminScrollPos;
                    } else {
                        if (currentViewTerritoryId) {
                            renderTerritoryView(currentViewTerritoryId);
                            const newNumbersScroll = document.getElementById('numbers-scroll-container');
                            if (newNumbersScroll) newNumbersScroll.scrollTop = numbersScrollPos;
                        }
                        else renderUserDashboard();
                    }
                }
            } catch (error) {
                console.error("Error al renderizar:", error);
            }
        };

        const renderLogin = () => {
            container.innerHTML = `
                <div class="max-w-md mx-auto bg-[#2a2a2a] p-10 rounded-3xl shadow-2xl mt-16 flex flex-col items-center border border-[#3a3a3a]">
                    
                    <i class="fa-solid fa-phone text-6xl text-[#f5c66d] mb-6"></i>
                    
                    <h2 class="text-3xl font-extrabold text-center mb-10 text-[#ffffff]">Teléfonos App</h2>
                    <form id="loginForm" class="space-y-6 w-full">
                        <div>
                            <input type="text" id="username" placeholder="Nombre de usuario" class="w-full px-5 py-3 border border-[#3a3a3a] rounded-xl bg-[#3a3a3a] text-[#ffffff] placeholder-[#b3b3b3] focus:outline-none focus:ring-2 focus:ring-[#f5c66d]" required autocomplete="off">
                        </div>
                        <div id="passwordFieldContainer" class="hidden fade-in">
                            <input type="password" id="password" placeholder="Contraseña secreta" class="w-full px-5 py-3 border border-[#3a3a3a] rounded-xl bg-[#3a3a3a] text-[#ffffff] placeholder-[#b3b3b3] focus:outline-none focus:ring-2 focus:ring-[#f5c66d]">
                        </div>
                        <button type="submit" class="w-full bg-[#f5c66d] text-[#1e1e1e] font-extrabold py-3 px-4 rounded-xl hover:bg-[#ffdf91] transition duration-200">
                            Ingresar
                        </button>
                    </form>
                    <p id="loginError" class="text-red-400 text-sm mt-5 text-center hidden"></p>
                </div>
            `;
            
            const userInput = document.getElementById('username');
            if (userInput) {
                userInput.addEventListener('input', (e) => {
                    const val = e.target.value.trim().toLowerCase();
                    const pwContainer = document.getElementById('passwordFieldContainer');
                    if (val === 'admin' || val === 'norte') {
                        pwContainer.classList.remove('hidden');
                    } else {
                        pwContainer.classList.add('hidden');
                    }
                });
            }

            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const u = document.getElementById('username').value.trim();
                    const p = document.getElementById('password').value.trim();
                    const uLower = u.toLowerCase();
                    
                    let user;
                    if (uLower === 'admin' || uLower === 'norte') {
                        user = allUsers.find(user => user?.username?.toLowerCase() === uLower && user.password === p);
                    } else {
                        user = allUsers.find(user => user?.username?.toLowerCase() === uLower);
                    }

                    if (user) {
                        loggedInAppUser = user;
                        currentViewTerritoryId = null;
                        try {
                            localStorage.setItem('savedSessionId', user.id);
                        } catch (storageError) {
                            console.warn("Navegador bloquea localStorage.");
                        }
                        renderApp();
                    } else {
                        const err = document.getElementById('loginError');
                        if (uLower === 'admin' || uLower === 'norte') {
                            err.textContent = "Contraseña incorrecta.";
                        } else {
                            err.textContent = "Usuario no encontrado. Pide al administrador que te registre.";
                        }
                        err.classList.remove('hidden');
                    }
                });
            }
        };

        const renderAdminDashboard = () => {
            const totalT = allTerritories.length;
            const completedT = allTerritories.filter(t => t.status === 'Completado').length;
            
            const userHidden = isUserAccordionOpen ? '' : 'hidden';
            const userChevron = isUserAccordionOpen ? 'fa-chevron-up' : 'fa-chevron-down';

            const pubHidden = isPublishersAccordionOpen ? '' : 'hidden';
            const pubChevron = isPublishersAccordionOpen ? 'fa-chevron-up' : 'fa-chevron-down';

            const formatDate = (isoStr) => {
                if (!isoStr) return '-';
                const d = new Date(isoStr);
                return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' });
            };

            let tableRows = '';
            if (allTerritories.length === 0) {
                tableRows = '<tr><td colspan="3" class="p-6 text-center text-[#b3b3b3]">No hay territorios creados.</td></tr>';
            } else {
                let sortedTerritories = [...allTerritories].sort((a,b) => (a.name || "").localeCompare(b.name || ""));
                
                if (sortActiveFirst) {
                    sortedTerritories.sort((a, b) => {
                        const aActive = a.assignedTo ? 1 : 0;
                        const bActive = b.assignedTo ? 1 : 0;
                        if (aActive !== bActive) return bActive - aActive; 
                        return (a.name || "").localeCompare(b.name || ""); 
                    });
                }
                
                tableRows = sortedTerritories.map(t => {
                    const assignedUser = allUsers.find(u => u.id === t.assignedTo);
                    const isNorteAssignee = assignedUser && assignedUser?.username?.toLowerCase() === 'norte';
                    const prog = getProgress(t, isNorteAssignee);
                    
                    let progressHtml = '';
                    if (t.status === 'Completado' || (prog.made === prog.required && prog.required > 0)) {
                        progressHtml = `<div class="text-[#cde7ac] font-bold text-sm"><i class="fa-solid fa-check-double"></i> ¡Finalizado!</div>`;
                    } else {
                        let percentage = prog.required === 0 ? 0 : (prog.made / prog.required) * 100;
                        let text = `${prog.made} de ${prog.required}`;
                        progressHtml = `
                            <div class="w-full bg-[#1e1e1e] rounded-full h-3 relative overflow-hidden">
                                <div class="bg-[#f5c66d] h-3 rounded-full transition-all duration-500" style="width: ${percentage}%"></div>
                            </div>
                            <div class="text-[11px] font-medium text-[#b3b3b3] mt-1.5">${text}</div>
                        `;
                    }
                    
                    const labelText = assignedUser ? assignedUser.username : '-';
                    const labelColor = assignedUser ? 'text-[#ffffff]' : 'text-[#b3b3b3]';

                    return `
                    <tr class="border-b border-[#2a2a2a] hover:bg-[#2a2a2a] transition-colors rounded-lg">
                        <td class="py-3 px-2 sm:px-4 font-medium text-[#ffffff] rounded-l-lg whitespace-nowrap w-[1%]">
                            <div class="flex items-center gap-2">
                                <span>${t.name}</span>
                                ${t.assignedTo ? `
                                <button onclick="unassignTerritory('${t.id}', '${t.name}')" class="text-red-400 hover:text-red-500 p-1" title="Quitar asignación (Recuperar)">
                                    <i class="fa-solid fa-user-xmark"></i>
                                </button>
                                ` : '<div class="w-6"></div>'}
                            </div>
                        </td>
                        <td class="py-3 px-2 sm:px-4 w-auto">${progressHtml}</td>
                        <td class="py-3 px-2 sm:px-4 rounded-r-lg w-[120px] sm:w-1/3">
                            <button onclick="openAssignSheet('${t.id}')" class="w-full border border-[#3a3a3a] rounded-lg py-1.5 px-3 bg-[#1e1e1e] text-left flex justify-between items-center focus:ring-1 focus:ring-[#f5c66d] outline-none text-xs sm:text-sm cursor-pointer shadow-sm hover:bg-[#2a2a2a] transition">
                                <span class="truncate pr-2 ${labelColor}">${labelText}</span>
                                <i class="fa-solid fa-chevron-down text-[#b3b3b3] text-[10px]"></i>
                            </button>
                        </td>
                    </tr>
                    `;
                }).join('');
            }

            const publishersCardsHtml = allUsers.filter(u => u.role !== 'admin' && u.username).map(u => {
                const userTerrs = allTerritories.filter(t => t.assignedTo === u.id);
                
                const sortedUserTerrs = [...userTerrs].sort((a, b) => {
                    const dateA = a.completedDate ? new Date(a.completedDate).getTime() : (a.assignedDate ? new Date(a.assignedDate).getTime() : 0);
                    const dateB = b.completedDate ? new Date(b.completedDate).getTime() : (b.assignedDate ? new Date(b.assignedDate).getTime() : 0);
                    return dateB - dateA;
                });

                const terrListHtml = sortedUserTerrs.map(t => {
                    let statusColor = "text-[#b3b3b3]";
                    if(t.status === 'Completado') statusColor = "text-[#cde7ac]";
                    if(t.status === 'En curso') statusColor = "text-[#f5c66d]";
                    
                    return `
                    <li class="flex flex-col border-b border-[#3a3a3a] py-2 last:border-0">
                        <div class="flex justify-between items-center mb-1">
                            <div class="flex items-center gap-2">
                                <span class="text-[#ffffff] font-bold text-xs">Terr. ${t.name}</span>
                                <span class="${statusColor} text-[10px] font-bold uppercase">${t.status}</span>
                            </div>
                            <button onclick="unassignTerritory('${t.id}', '${t.name}')" class="text-red-400 hover:text-red-500 p-1" title="Quitar asignación">
                                <i class="fa-solid fa-circle-minus"></i>
                            </button>
                        </div>
                        <div class="flex justify-between text-[10px] text-[#b3b3b3]">
                            <span>Asignado: ${formatDate(t.assignedDate)}</span>
                            <span>${t.completedDate ? `Terminado: ${formatDate(t.completedDate)}` : '-'}</span>
                        </div>
                    </li>`;
                }).join('');
                
                const securityText = u.password ? `<p class="text-[10px] text-[#b3b3b3] font-mono"><i class="fa-solid fa-lock text-[#cde7ac] mr-1"></i> Protegido con contraseña</p>` : `<p class="text-[10px] text-[#b3b3b3] font-mono"><i class="fa-solid fa-bolt text-[#f5c66d] mr-1"></i> Acceso directo</p>`;

                return `
                <div class="bg-[#1e1e1e] p-5 rounded-2xl border border-[#3a3a3a]">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="bg-[#2a2a2a] p-2.5 rounded-full"><i class="fa-solid fa-user text-[#add8e6]"></i></div>
                        <div>
                            <h4 class="font-bold text-[#ffffff]">${u.username}</h4>
                            ${securityText}
                        </div>
                    </div>
                    <div class="bg-[#2a2a2a] rounded-xl p-3">
                        <h5 class="text-[10px] font-bold text-[#b3b3b3] mb-2 uppercase tracking-wider">Historial de Territorios</h5>
                        <ul class="space-y-1">
                            ${terrListHtml || '<li class="text-xs text-[#b3b3b3]">Ninguno</li>'}
                        </ul>
                    </div>
                </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="space-y-8">
                    <!-- 1. Lista de Territorios -->
                    <div class="bg-[#121212] p-4 sm:p-8 rounded-3xl shadow-xl border border-[#2a2a2a]">
                        <h3 class="text-2xl font-extrabold mb-6 border-b border-[#2a2a2a] pb-4 text-[#ffffff]"><i class="fa-solid fa-map text-[#f5c66d]"></i> Territorios</h3>
                        <div id="admin-table-container" class="table-container overflow-x-auto pr-2">
                            <table class="min-w-full text-left text-sm">
                                <thead class="bg-[#2a2a2a] sticky top-0 z-10 shadow-sm">
                                <tr>
                                    <th class="py-3 px-2 sm:px-4 w-[1%] whitespace-nowrap text-[#b3b3b3] rounded-l-lg">Terr.</th>
                                    <th class="py-3 px-2 sm:px-4 w-auto text-[#b3b3b3]">
                                        <div class="flex items-center justify-between pr-2">
                                            <span>Estado</span>
                                            <button onclick="toggleSortActive()" class="${sortActiveFirst ? 'bg-[#f5c66d] text-[#1e1e1e]' : 'bg-[#3a3a3a] text-[#b3b3b3] hover:text-[#ffffff]'} px-2 py-1 rounded text-[10px] font-bold transition flex items-center gap-1 shadow-sm" title="Mostrar en uso primero">
                                                <i class="fa-solid fa-sort"></i> En uso
                                            </button>
                                        </div>
                                    </th>
                                    <th class="py-3 px-2 sm:px-4 w-[120px] sm:w-1/3 text-[#b3b3b3] rounded-r-lg">Asignado a</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 2. Estadísticas -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-[#2a2a2a] p-6 rounded-2xl shadow border border-[#3a3a3a]">
                            <h3 class="text-[#b3b3b3] text-sm font-bold mb-1">Territorios</h3>
                            <p class="text-3xl font-extrabold text-[#ffffff]">${totalT}</p>
                        </div>
                        <div class="bg-[#2a2a2a] p-6 rounded-2xl shadow border border-[#3a3a3a]">
                            <h3 class="text-[#b3b3b3] text-sm font-bold mb-1">Completados</h3>
                            <p class="text-3xl font-extrabold text-[#ffffff]">${completedT}</p>
                        </div>
                    </div>

                    <!-- 3. Publicadores (Desplegable) -->
                    <div class="bg-[#2a2a2a] p-8 rounded-2xl shadow-md border border-[#3a3a3a]">
                        <div class="flex justify-between items-center cursor-pointer group" onclick="togglePublishersAccordion()">
                            <h3 class="text-xl font-bold text-[#ffffff] group-hover:text-[#add8e6] transition-colors"><i class="fa-solid fa-users text-[#add8e6] mr-2"></i> Publicadores</h3>
                            <i id="publishers-chevron" class="fa-solid ${pubChevron} text-[#b3b3b3] group-hover:text-[#ffffff] transition-colors text-lg"></i>
                        </div>
                        <div id="publishers-container" class="${pubHidden}">
                            <div class="border-t border-[#3a3a3a] mt-6 pt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                ${publishersCardsHtml}
                            </div>
                        </div>
                    </div>

                    <!-- 4. Crear Usuario (Desplegable) -->
                    <div class="bg-[#2a2a2a] p-8 rounded-2xl shadow-md border border-[#3a3a3a]">
                        <div class="flex justify-between items-center cursor-pointer group" onclick="toggleUserAccordion()">
                            <h3 class="text-xl font-bold text-[#ffffff] group-hover:text-[#f5c66d] transition-colors"><i class="fa-solid fa-user-plus text-[#f5c66d] mr-2"></i> Nuevo Usuario</h3>
                            <i id="user-chevron" class="fa-solid ${userChevron} text-[#b3b3b3] group-hover:text-[#ffffff] transition-colors text-lg"></i>
                        </div>
                        <div id="user-form-container" class="${userHidden}">
                            <div class="border-t border-[#3a3a3a] mt-6 pt-6">
                                <form id="createUserForm" class="space-y-5 max-w-xl mx-auto">
                                    <input type="text" id="newUsername" placeholder="Nombre del nuevo publicador" class="w-full px-5 py-3 border border-[#3a3a3a] rounded-xl bg-[#3a3a3a] text-[#ffffff] placeholder-[#b3b3b3] focus:outline-none focus:ring-2 focus:ring-[#f5c66d]" required>
                                    <button type="submit" class="w-full bg-[#f5c66d] text-[#1e1e1e] font-extrabold py-3 rounded-xl hover:bg-[#ffdf91] transition duration-200">Crear Publicador</button>
                                </form>
                            </div>
                        </div>
                    </div>

            let displayStatus = (territory.status === 'Ronda 1' || territory.status === 'Ronda 2') ? 'En curso' : territory.status;

            container.innerHTML = `
                <div class="bg-[#121212] rounded-3xl shadow-xl overflow-hidden flex flex-col h-[85vh] border border-[#2a2a2a]">

        // ---- LÓGICA DEL BOTTOM SHEET ----

            if(sheet) {
                sheet.classList.remove('translate-y-0');
                sheet.classList.add('translate-y-full');
            }

            const sheet = document.getElementById('bottom-sheet');
            if(overlay) {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                overlay.classList.add('opacity-100', 'pointer-events-auto');

                const bgClass = isSelected ? 'bg-[#2a2a2a]' : 'hover:bg-[#2a2a2a]';
                
                content += `
                <button onclick="closeAndAssign('${tId}', '${u.id}')" class="w-full text-left p-4 border-b border-[#2a2a2a] ${bgClass} transition flex justify-between items-center">
                    <div class="flex items-center gap-3">

            document.getElementById('bottom-sheet-content').innerHTML = content;
            showBottomSheet();

        window.closeAndAssign = (tId, userId) => {

        window.openResultSheet = (tId, numIndex, field, titleLabel) => {
            const territory = allTerritories.find(t => t.id === tId);
            const currentVal = territory.numbers[numIndex][field] || '-';
            
            document.getElementById('bottom-sheet-title').innerText = `Seleccionar ${titleLabel}`;
            
            let content = '';
            OpcionesLlamada.forEach(opt => {
                const isSelected = currentVal === opt;
                const isDash = opt === '-';
                const textColor = isSelected ? 'text-[#f5c66d]' : (isDash ? 'text-[#b3b3b3]' : 'text-[#ffffff]');
                const bgClass = isSelected ? 'bg-[#2a2a2a]' : 'hover:bg-[#2a2a2a]';
                
                content += `
                <button onclick="closeAndUpdateResult('${tId}', ${numIndex}, '${field}', '${opt}')" class="w-full text-left p-4 border-b border-[#2a2a2a] ${bgClass} transition flex justify-between items-center text-sm md:text-base">
                    <span class="${textColor} ${isSelected ? 'font-bold' : ''}">${opt}</span>
                    ${isSelected ? '<i class="fa-solid fa-check text-[#f5c66d] text-lg"></i>' : ''}
                </button>`;
            });
            
            document.getElementById('bottom-sheet-content').innerHTML = content;
            showBottomSheet();
        };

        window.closeAndUpdateResult = (tId, numIndex, field, newResult) => {
            closeBottomSheet();
            updateResult(tId, numIndex, field, newResult);
        };

        // ---- ACCIONES SECUNDARIAS ----
        window.toggleSortActive = () => {
            sortActiveFirst = !sortActiveFirst;
            renderApp();
        };

        window.toggleUserAccordion = () => {
            isUserAccordionOpen = !isUserAccordionOpen;
            const content = document.getElementById('user-form-container');
            const chevron = document.getElementById('user-chevron');
            if (isUserAccordionOpen) {
                content.classList.remove('hidden');
                chevron.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                content.classList.add('hidden');
                chevron.classList.replace('fa-chevron-up', 'fa-chevron-down');

        };

            const chevron = document.getElementById('publishers-chevron');
            if (isPublishersAccordionOpen) {

                chevron.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                content.classList.add('hidden');
                chevron.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        };

        window.copyPhone = (phone, btnElement) => {
            const el = document.createElement('textarea');
            el.value = phone;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            if (btnElement) {
                const icon = btnElement.querySelector('i');
                icon.className = 'fa-solid fa-check text-[#cde7ac]';
                setTimeout(() => { icon.className = 'fa-regular fa-copy'; }, 1500);

        window.unassignTerritory = (tId, tName) => {
            if(confirm(`¿Seguro que deseas quitarle el Territorio ${tName} al publicador asignado? Volverá a estar libre, pendiente y su progreso regresará a cero.`)) {
                assignTerritory(tId, "");
            }
        };

        window.assignTerritory = async (tId, userId) => {
            try {
                const tRef = doc(db, 'artifacts', appId, 'public', 'data', 'territories', tId);
                const territory = allTerritories.find(t => t.id === tId);
                let newStatus = territory.status;
                let updateData = { assignedTo: userId || null };
                
                if (userId && newStatus === 'Pendiente') newStatus = 'En curso';
                
                if (!userId) { 
                    newStatus = 'Pendiente'; 
                    updateData.assignedDate = null; 
                    updateData.completedDate = null; 
                    updateData.numbers = (territory.numbers || []).map(n => ({
                        ...n,
                        result: "-",
                        result2: "-",
                        checked1: false,
                        checked2: false
                    }));
                }
                
                if (userId && territory.assignedTo !== userId) { 
                    updateData.assignedDate = new Date().toISOString(); 
                    updateData.completedDate = null; 
                }

                updateData.status = newStatus;
                await updateDoc(tRef, updateData);
            } catch (err) { console.error("Error asignando:", err); }
        };

        window.updateResult = async (tId, numIndex, field, newResult) => {
            const territory = allTerritories.find(t => t.id === tId);
            if (!territory) return;
            
            territory.numbers[numIndex][field] = newResult;

            const assignedUser = allUsers.find(u => u.id === territory.assignedTo);
            const isNorteAssignee = assignedUser && assignedUser?.username?.toLowerCase() === 'norte';

            const prog = getProgress(territory, isNorteAssignee);
            const isComplete = (prog.made === prog.required && prog.required > 0);

            let newStatus = territory.assignedTo ? 'En curso' : 'Pendiente';
            let completedDate = territory.completedDate || null;

            if (isComplete) {
                newStatus = 'Completado';
                if (territory.status !== 'Completado') completedDate = new Date().toISOString();
            } else {
                if (territory.status === 'Completado') completedDate = null;
            }

            try { 
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'territories', tId), { 
                    numbers: territory.numbers,
                    status: newStatus,
                    completedDate: completedDate
                }); 
            } 
            catch (err) { console.error(err); }
        };

        window.updateNumberField = async (tId, numIndex, field, value) => {
            const territory = allTerritories.find(t => t.id === tId);
            if (!territory) return;
            territory.numbers[numIndex][field] = value;
            try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'territories', tId), { numbers: territory.numbers }); } 
            catch (err) { console.error(err); }
        };

        // Lógica especial para Norte: Auto-fecha y Pegado múltiple
        window.handleAssigneeChange = async (tId, numIndex, value) => {
            const territory = allTerritories.find(t => t.id === tId);
            if (!territory) return;
            
            territory.numbers[numIndex].customAssignee = value;
            
            // Auto-fecha: Si hay nombre y no hay fecha, poner fecha de hoy
            if (value.trim() !== '' && !territory.numbers[numIndex].date) {
                const today = new Date().toISOString().split('T')[0];
                territory.numbers[numIndex].date = today;
                
                const dateInput = document.getElementById(`date-${tId}-${numIndex}`);
                if(dateInput) dateInput.value = today;
            }
            
            try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'territories', tId), { numbers: territory.numbers }); } 
            catch (err) { console.error(err); }
        };

        window.handleAssigneePaste = async (e, tId, startIndex) => {
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            
            // Si el texto pegado tiene saltos de línea (varios nombres a la vez)
            if (pasteData.includes('\n')) {
                e.preventDefault(); 
                const names = pasteData.split(/[\r\n]+/).filter(n => n.trim() !== '');
                const territory = allTerritories.find(t => t.id === tId);
                if (!territory) return;
                
                const today = new Date().toISOString().split('T')[0];
                let updated = false;

                // Rellenar hacia abajo las siguientes celdas
                for(let i = 0; i < names.length; i++) {
                    const idx = startIndex + i;
                    if (idx < territory.numbers.length) {
                        territory.numbers[idx].customAssignee = names[i].trim();
                        if (!territory.numbers[idx].date) {
                            territory.numbers[idx].date = today;
                        }
                        updated = true;
                    }
                }
                
                if (updated) {
                    try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'territories', tId), { numbers: territory.numbers }); } 
                    catch (err) { console.error(err); }
                }
            }
        };

        // ---- INICIALIZACIÓN Y SUSCRIPCIONES A FIREBASE ----
        const initDataListeners = () => {
            const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
            onSnapshot(usersRef, (snapshot) => {
                const users = [];
                snapshot.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
                
                if (users.length === 0) { addDoc(usersRef, { username: 'admin', password: 'admin', role: 'admin' }); }
                if (users.length > 0 && !users.find(u => u?.username?.toLowerCase() === 'norte')) {
                    addDoc(usersRef, { username: 'Norte', password: 'norte', role: 'user' });
                }
                
                if (users.length > 0) {
                    allUsers = users;
                    
                    if (!loggedInAppUser) {
                        let savedId = null;
                        try { savedId = localStorage.getItem('savedSessionId'); } catch(e){}
                        
                        if (savedId) {
                            const found = allUsers.find(u => u.id === savedId);
                            if (found) loggedInAppUser = found;
                        }
                    }

                    if (loggedInAppUser) {
                        const updatedMe = allUsers.find(u => u.id === loggedInAppUser.id);
                        if (updatedMe) loggedInAppUser = updatedMe;
                    }
                    
                    if(loggedInAppUser || window.hasLoadedUsers) renderApp();
                    window.hasLoadedUsers = true;
                }
            }, (error) => console.error(error));

            const terrRef = collection(db, 'artifacts', appId, 'public', 'data', 'territories');
            onSnapshot(terrRef, (snapshot) => {
                const terrs = [];
                snapshot.forEach(doc => terrs.push({ id: doc.id, ...doc.data() }));
                allTerritories = terrs;
                
                if(loggedInAppUser || window.hasLoadedTerritories) renderApp();
                window.hasLoadedTerritories = true;
            }, (error) => console.error(error));
        };

        onAuthStateChanged(auth, (user) => {
            firebaseUser = user;
            if (user) { 
                initDataListeners(); 
                renderApp(); 
            }
        });

        initAuth();

    </script>
</body>
</html>
