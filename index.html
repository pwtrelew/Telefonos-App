<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teléfonos App</title>
    
    <!-- Íconos de la aplicación -->
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .table-container { max-height: 60vh; overflow-y: auto; }
        
        /* Scrollbar styling for dark mode */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-[#1e1e1e] text-[#ffffff] min-h-screen">

    <!-- Navbar -->
    <nav class="bg-[#121212] text-[#ffffff] shadow-md p-4 flex justify-between items-center sticky top-0 z-50 rounded-b-3xl">
        <div class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-phone text-[#f5c66d]"></i> Teléfonos App
        </div>
        <div id="nav-user-info" class="hidden flex items-center gap-4">
            <span id="nav-username" class="font-medium text-[#ffffff]"></span>
            <button onclick="logout()" class="text-[#b3b3b3] hover:text-[#ffffff] transition text-sm">
                <i class="fa-solid fa-right-from-bracket"></i> Salir
            </button>
        </div>
    </nav>

    <!-- Contenedor Principal de la App -->
    <main id="app-container" class="p-4 max-w-7xl mx-auto fade-in">
        <div class="text-center py-10">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-[#f5c66d]"></i>
            <p class="mt-4 text-[#b3b3b3]">Cargando sistema...</p>
        </div>
    </main>

    <!-- PWA Setup Dinámico -->
    <script>
        const manifest = {
            name: "Teléfonos App",
            short_name: "Territorios",
            start_url: ".",
            display: "standalone",
            background_color: "#1e1e1e",
            theme_color: "#121212",
            icons: [{"src": "./icon.png", "sizes": "512x512", "type": "image/png"}]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURL}">`);
        
        if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.protocol === 'http:')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            });
        }
    </script>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración de tu proyecto en Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyC0Hzs2DrYYxqVsOgjs2m7GbFZqGRrrZnQ",
            authDomain: "telefonos-app.firebaseapp.com",
            projectId: "telefonos-app",
            storageBucket: "telefonos-app.firebasestorage.app",
            messagingSenderId: "817969882853",
            appId: "1:817969882853:web:ad7a27f25133be85c6160c"
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'territorios-app-123';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Estado Global
        let firebaseUser = null;
        let loggedInAppUser = null; 
        let allUsers = [];
        let allTerritories = [];
        let currentViewTerritoryId = null;
        let sortActiveFirst = false;

        // Estado de los acordeones del administrador
        let isUserAccordionOpen = false;
        let isPublishersAccordionOpen = false;

        const OpcionesLlamada = [
            "-", 
            "No atendió nadie", 
            "No Abonado/ Inhabilitado", 
            "Cortó/ No le Interesa", 
            "Se dejó mensaje al contestador", 
            "Atendió, Ocupado", 
            "Empresa o Comercio", 
            "Revisita", 
            "NO volver a llamar"
        ];

        const getProgress = (territory, isNorteAssignee) => {
            let totalRequired = 0;
            let totalMade = 0;

            territory.numbers.forEach(n => {
                totalRequired++; 
                if (n.result && n.result !== "-") totalMade++;

                if (!isNorteAssignee) {
                    totalRequired++; 
                    if (n.result2 && n.result2 !== "-") {
                        totalMade++;
                    }
                }
            });
            
            return { required: totalRequired, made: totalMade };
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error de autenticación:", error);
                document.getElementById('app-container').innerHTML = `<p class="text-red-500">Error de conexión. Intente recargar.</p>`;
            }
        };

        const container = document.getElementById('app-container');

        window.renderApp = () => {
            const navUserInfo = document.getElementById('nav-user-info');
            const navUsername = document.getElementById('nav-username');

            let numbersScrollPos = 0;
            const numbersScrollContainer = document.getElementById('numbers-scroll-container');
            if (numbersScrollContainer) numbersScrollPos = numbersScrollContainer.scrollTop;

            let adminScrollPos = 0;
            const adminScrollContainer = document.getElementById('admin-table-container');
            if (adminScrollContainer) adminScrollPos = adminScrollContainer.scrollTop;

            if (!loggedInAppUser) {
                navUserInfo.classList.add('hidden');
                renderLogin();
            } else {
                navUserInfo.classList.remove('hidden');
                navUsername.innerHTML = `<i class="fa-solid ${loggedInAppUser.role === 'admin' ? 'fa-user-shield' : 'fa-user'} text-[#f5c66d]"></i> ${loggedInAppUser.username}`;
                
                if (loggedInAppUser.role === 'admin') {
                    renderAdminDashboard();
                    const newAdminScroll = document.getElementById('admin-table-container');
                    if (newAdminScroll) newAdminScroll.scrollTop = adminScrollPos;
                } else {
                    if (currentViewTerritoryId) {
                        renderTerritoryView(currentViewTerritoryId);
                        const newNumbersScroll = document.getElementById('numbers-scroll-container');
                        if (newNumbersScroll) newNumbersScroll.scrollTop = numbersScrollPos;
                    }
                    else renderUserDashboard();
                }
            }
        };

        const renderLogin = () => {
            container.innerHTML = `
                <div class="max-w-md mx-auto bg-[#2a2a2a] p-10 rounded-3xl shadow-2xl mt-16 flex flex-col items-center border border-[#3a3a3a]">
                    <img src="./icon.png" alt="Teléfonos App Logo" class="w-24 h-24 mb-6 rounded-2xl shadow-lg" onerror="this.outerHTML='<i class=\\'fa-solid fa-phone text-6xl text-[#f5c66d] mb-6\\'></i>'">
                    <h2 class="text-3xl font-extrabold text-center mb-10 text-[#ffffff]">Teléfonos App</h2>
                    <form id="loginForm" class="space-y-6 w-full">
                        <div>
                            <input type="text" id="username" placeholder="Nombre de usuario" class="w-full px-5 py-3 border border-[#3a3a3a] rounded-xl bg-[#3a3a3a] text-[#ffffff] placeholder-[#b3b3b3] focus:outline-none focus:ring-2 focus:ring-[#f5c66d]" required autocomplete="off">
                        </div>
                        <div id="passwordFieldContainer" class="hidden fade-in">
                            <input type="password" id="password" placeholder="Contraseña secreta" class="w-full px-5 py-3 border border-[#3a3a3a] rounded-xl bg-[#3a3a3a] text-[#ffffff] placeholder-[#b3b3b3] focus:outline-none focus:ring-2 focus:ring-[#f5c66d]">
                        </div>
                        <button type="submit" class="w-full bg-[#f5c66d] text-[#1e1e1e] font-extrabold py-3 px-4 rounded-xl hover:bg-[#ffdf91] transition duration-200">
                            Ingresar
                        </button>
                    </form>
                    <p id="loginError" class="text-red-400 text-sm mt-5 text-center hidden"></p>
                </div>
            `;
            
            // Mostrar campo de contraseña mágicamente solo si el usuario es Admin o Norte
            document.getElementById('username').addEventListener('input', (e) => {
                const val = e.target.value.trim().toLowerCase();
                const pwContainer = document.getElementById('passwordFieldContainer');
                if (val === 'admin' || val === 'norte') {
                    pwContainer.classList.remove('hidden');
                } else {
                    pwContainer.classList.add('hidden');
                }
            });

            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('password').value.trim();
                const uLower = u.toLowerCase();
                
                let user;
                if (uLower === 'admin' || uLower === 'norte') {
                    user = allUsers.find(user => user.username.toLowerCase() === uLower && user.password === p);
                } else {
                    // Para usuarios normales, solo revisamos que el nombre exista
                    user = allUsers.find(user => user.username.toLowerCase() === uLower);
                }

                if (user) {
                    loggedInAppUser = user;
                    currentViewTerritoryId = null;
                    localStorage.setItem('savedSessionId', user.id); // Guarda la sesión en el celular
                    renderApp();
                } else {
                    const err = document.getElementById('loginError');
                    if (uLower === 'admin' || uLower === 'norte') {
                        err.textContent = "Contraseña incorrecta.";
                    } else {
                        err.textContent = "Usuario no encontrado. Pide al administrador que te registre.";
                    }
                    err.classList.remove('hidden');
                }
            });
        };

        const renderAdminDashboard = () => {
            const totalT = allTerritories.length;
            const completedT = allTerritories.filter(t => t.status === 'Completado').length;
            
            const userHidden = isUserAccordionOpen ? '' : 'hidden';
            const userChevron = isUserAccordionOpen ? 'fa-chevron-up' : 'fa-chevron-down';

            const pubHidden = isPublishersAccordionOpen ? '' : 'hidden';
            const pubChevron = isPublishersAccordionOpen ? 'fa-chevron-up' : 'fa-chevron-down';

            const formatDate = (isoStr) => {
                if (!isoStr) return '-';
                const d = new Date(isoStr);
                return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' });
            };

            // Construir filas de tabla de forma segura
            let tableRows = '';
            if (allTerritories.length === 0) {
                tableRows = '<tr><td colspan="3" class="p-6 text-center text-[#b3b3b3]">No hay territorios creados.</td></tr>';
            } else {
                let sortedTerritories = [...allTerritories].sort((a,b) => a.name.localeCompare(b.name));
                
                // Aplicar orden prioritario si el botón está activado
                if (sortActiveFirst) {
                    sortedTerritories.sort((a, b) => {
                        const aActive = a.assignedTo ? 1 : 0;
                        const bActive = b.assignedTo ? 1 : 0;
                        if (aActive !== bActive) return bActive - aActive; 
                        return a.name.localeCompare(b.name); 
                    });
                }
                
                tableRows = sortedTerritories.map(t => {
                    const assignedUser = allUsers.find(u => u.id === t.assignedTo);
                    const isNorteAssignee = assignedUser && assignedUser.username.toLowerCase() === 'norte';
                    const prog = getProgress(t, isNorteAssignee);
                    
                    let progressHtml = '';
                    if (t.status === 'Completado' || (prog.made === prog.required && prog.required > 0)) {
                        progressHtml = `<div class="text-[#cde7ac] font-bold text-sm"><i class="fa-solid fa-check-double"></i> ¡Finalizado!</div>`;
                    } else {
                        let percentage = prog.required === 0 ? 0 : (prog.made / prog.required) * 100;
                        let text = `${prog.made} de ${prog.required}`;
                        progressHtml = `
                            <div class="w-full bg-[#1e1e1e] rounded-full h-3 relative overflow-hidden">
                                <div class="bg-[#f5c66d] h-3 rounded-full transition-all duration-500" style="width: ${percentage}%"></div>
                            </div>
                            <div class="text-[11px] font-medium text-[#b3b3b3] mt-1.5">${text}</div>
                        `;
                    }
                    
                    const userOptionsHtml = allUsers.filter(u => u.role !== 'admin').map(u => 
                        `<option value="${u.id}" ${t.assignedTo === u.id ? 'selected' : ''} class="text-[#ffffff]">${u.username}</option>`
                    ).join('');

                    return `
                    <tr class="border-b border-[#2a2a2a] hover:bg-[#2a2a2a] transition-colors rounded-lg">
                        <td class="py-3 px-2 sm:px-4 font-medium text-[#ffffff] rounded-l-lg whitespace-nowrap w-[1%]">
                            <div class="flex items-center gap-2">
                                <span>${t.name}</span>
                                ${t.assignedTo ? `
                                <button onclick="unassignTerritory('${t.id}', '${t.name}')" class="text-red-400 hover:text-red-500 p-1" title="Quitar asignación (Recuperar)">
                                    <i class="fa-solid fa-user-xmark"></i>
                                </button>
                                ` : '<div class="w-6"></div>'}
                            </div>
                        </td>
                        <td class="py-3 px-2 sm:px-4 w-auto">${progressHtml}</td>
                        <td class="py-3 px-2 sm:px-4 rounded-r-lg w-[110px] sm:w-1/3">
                            <select id="assign-${t.id}" autocomplete="off" onchange="assignTerritory('${t.id}', this.value)" class="border border-[#3a3a3a] rounded-lg p-2 text-xs sm:text-sm bg-[#1e1e1e] text-[#ffffff] w-full focus:ring-1 focus:ring-[#f5c66d] focus:border-[#f5c66d] outline-none cursor-pointer">
                                <option value="" ${!t.assignedTo ? 'selected' : ''} class="text-[#b3b3b3]">-</option>
                                ${userOptionsHtml}
                            </select>
                        </td>
                    </tr>
                    `;
                }).join('');
            }

            // Construir tarjetas de publicadores
            const publishersCardsHtml = allUsers.filter(u => u.role !== 'admin').map(u => {
                const userTerrs = allTerritories.filter(t => t.assignedTo === u.id);
                
                // Ordenar por fecha más reciente
                const sortedUserTerrs = [...userTerrs].sort((a, b) => {
                    const dateA = a.completedDate ? new Date(a.completedDate).getTime() : (a.assignedDate ? new Date(a.assignedDate).getTime() : 0);
                    const dateB = b.completedDate ? new Date(b.completedDate).getTime() : (b.assignedDate ? new Date(b.assignedDate).getTime() : 0);
                    return dateB - dateA;
                });

                const terrListHtml = sortedUserTerrs.map(t => {
                    let statusColor = "text-[#b3b3b3]";
                    if(t.status === 'Completado') statusColor = "text-[#cde7ac]";
                    if(t.status === 'En curso') statusColor = "text-[#f5c66d]";
                    
                    return `
                    <li class="flex flex-col border-b border-[#3a3a3a] py-2 last:border-0">
                        <div class="flex justify-between items-center mb-1">
                            <div class="flex items-center gap-2">
                                <span class="text-[#ffffff] font-bold text-xs">Terr. ${t.name}</span>
                                <span class="${statusColor} text-[10px] font-bold uppercase">${t.status}</span>
                            </div>
                            <button onclick="unassignTerritory('${t.id}', '${t.name}')" class="text-red-400 hover:text-red-500 p-1" title="Quitar asignación">
                                <i class="fa-solid fa-circle-minus"></i>
                            </button>
                        </div>
                        <div class="flex justify-between text-[10px] text-[#b3b3b3]">
                            <span>Asignado: ${formatDate(t.assignedDate)}</span>
                            <span>${t.completedDate ? `Terminado: ${formatDate(t.completedDate)}` : '-'}</span>
                        </div>
                    </li>`;
                }).join('');
                
                const securityText = u.password ? `<p class="text-[10px] text-[#b3b3b3] font-mono"><i class="fa-solid fa-lock text-[#cde7ac] mr-1"></i> Protegido con contraseña</p>` : `<p class="text-[10px] text-[#b3b3b3] font-mono"><i class="fa-solid fa-bolt text-[#f5c66d] mr-1"></i> Acceso directo</p>`;

                return `
                <div class="bg-[#1e1e1e] p-5 rounded-2xl border border-[#3a3a3a]">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="bg-[#2a2a2a] p-2.5 rounded-full"><i class="fa-solid fa-user text-[#add8e6]"></i></div>
                        <div>
                            <h4 class="font-bold text-[#ffffff]">${u.username}</h4>
                            ${securityText}
